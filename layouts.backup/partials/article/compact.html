<article>
    <div class="article-compact">
        <a href="{{ .RelPermalink }}">
            <div class="article-title">
                <p>{{ .Title }}</p>
            </div>
            <div class="article-description">
                <p>
                    {{ with .Params.description }}
                        {{ . }}
                    {{ end }}
                </p>
                <span>Read more {{ partial "helper/icon" "arrow-right" }}</span>
            </div>
        </a>
    </div>
</article>
