{{ $childPages := union .Sections .Pages }}
<ul>
    {{ range $childPages.ByTitle }}
        <li>                                    
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            {{ if or (.Sections) (.Pages) }}
                {{ partial "helper/recursive.html" . }}
            {{ end }}
        </li>
    {{ end }}
</ul>
