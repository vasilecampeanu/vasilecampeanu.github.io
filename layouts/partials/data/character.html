{{/*  Canvas  */}}
<canvas id="character-interaction"></canvas>

{{/*  Three.js  */}}
{{ $threeJS := resources.Get "js/three.min.js" | resources.Minify | resources.Fingerprint }}
<script src="{{ $threeJS.RelPermalink }}" {{ template "integrity" $threeJS }}></script>

<!-- This brings in the ability to load custom 3D objects in the .gltf file format. Blender allows the ability to export to this format out the box -->
<script src='https://cdn.jsdelivr.net/gh/mrdoob/Three.js@r92/examples/js/loaders/GLTFLoader.js'></script>

{{/*  Character Interaction script.  */}}
{{ $characterInteraction := resources.Get "js/character-interaction.js" | resources.Minify | resources.Fingerprint }}
<script defer src="{{ $characterInteraction.RelPermalink }}" {{ template "integrity" $characterInteraction }}></script>
